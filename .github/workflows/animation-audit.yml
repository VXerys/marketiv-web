name: Animation Audit

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'src/app/**'
      - 'src/components/**'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run animation audit (annotate-only)
        run: npm run animation-audit
      - name: Audit complete
        run: echo "Animation audit finished (annotate-only)"
